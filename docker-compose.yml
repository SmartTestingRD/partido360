version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    # Solo exponemos internamente para el proxy de Coolify
    expose:
      - "3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "80"
    depends_on:
      - backend
    restart: unless-stopped
