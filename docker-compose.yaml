version: '3.8'
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - '3001'
    environment:
      - NODE_ENV=production
      - PORT=3001
    labels:
      - "coolify.fqdn=https://${SERVICE_FQDN_BACKEND:-api.smarttesting.com.do}"
    restart: unless-stopped
    networks:
      - default
      - coolify

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - '80'
    depends_on:
      - backend
    labels:
      - "coolify.fqdn=https://${SERVICE_FQDN_FRONTEND:-app.smarttesting.com.do}"
    restart: unless-stopped

networks:
  default:
  coolify:
    external: true