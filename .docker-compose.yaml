version: '3.8'
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - '3001'
    environment:
      - NODE_ENV=production
      - PORT=3001
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.p360-demo-be.rule=Host(`${SERVICE_FQDN_BACKEND:-api.smarttesting.com.do}`)"
      - "traefik.http.routers.p360-demo-be.entrypoints=https"
      - "traefik.http.routers.p360-demo-be.tls=true"
      - "traefik.http.routers.p360-demo-be.tls.certresolver=letsencrypt"
      - "traefik.http.services.p360-demo-be.loadbalancer.server.port=3001"
      - "traefik.docker.network=coolify"
    restart: unless-stopped
    networks:
      - default
      - coolify

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - '80'
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.p360-demo-fe.rule=Host(`${SERVICE_FQDN_FRONTEND:-app.smarttesting.com.do}`)"
      - "traefik.http.routers.p360-demo-fe.entrypoints=https"
      - "traefik.http.routers.p360-demo-fe.tls=true"
      - "traefik.http.routers.p360-demo-fe.tls.certresolver=letsencrypt"
      - "traefik.http.services.p360-demo-fe.loadbalancer.server.port=80"
      - "traefik.docker.network=coolify"
    restart: unless-stopped
    networks:
      - default
      - coolify

networks:
  default:
  coolify:
    external: true